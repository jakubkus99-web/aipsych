<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#090b10;--bg2:#0d1018;--bg3:#121620;--bg4:#171c2a;--bdr:#1a1f30;--bdr2:#252e45;
  --tx:#d0d5e0;--tx2:#8b92a5;--tx3:#5a6278;--tx4:#363d50;--txH:#f0f2f8;
  --uswps:#e8854f;--pwr:#54a5e8;--other:#777;--acc:#e8854f;
  --w:#6cb4d9;--u:#a87dd4;--k:#6dd4a8;--red:#d45454;--green:#54d48a;
  --radius:10px;--hdr-bg:linear-gradient(180deg,#0e1220,#0b0e16);
  --abtn-c:#14202e;--abtn-a:#2a1c14;--tab-on:#161d30;
  --topic-bdr:rgba(255,255,255,.02);--ai-dot:#6a4a38;--ai-txt:#c09570;
  --inp-col:#e4e8f0;--chip-off:var(--bg);--note-bg:#0f1318}
html.light{--bg:#f4f5f8;--bg2:#fff;--bg3:#f0f1f5;--bg4:#e8eaef;--bdr:#dcdfe6;--bdr2:#c5c9d4;
  --tx:#2a2e38;--tx2:#4a5068;--tx3:#6b7188;--tx4:#a0a6b8;--txH:#1a1d26;
  --uswps:#d06a35;--pwr:#3080c8;--other:#888;--acc:#d06a35;
  --w:#2a7fa8;--u:#7b52b0;--k:#2a9e6e;--red:#c43a3a;--green:#2a9e5a;
  --hdr-bg:linear-gradient(180deg,#fff,#f8f9fb);
  --abtn-c:#e0eef6;--abtn-a:#f6e8dd;--tab-on:#eaecf2;
  --topic-bdr:rgba(0,0,0,.04);--ai-dot:#b07040;--ai-txt:#8a5a30;
  --inp-col:#1a1d26;--chip-off:var(--bg3);--note-bg:#f8f8fa}
html{font-size:17px}
body{font-family:'DM Sans',system-ui,sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;-webkit-font-smoothing:antialiased;transition:background .3s,color .3s}
button{font-family:inherit;cursor:pointer;border:none;transition:all .15s}
input,textarea,select{font-family:inherit;outline:none}
::selection{background:var(--acc);color:#fff}

.login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}
.login-box{max-width:460px;width:100%;background:var(--bg3);border-radius:16px;border:1px solid var(--bdr2);padding:48px 38px;text-align:center}
.login-box .logo{width:58px;height:58px;border-radius:15px;background:linear-gradient(135deg,var(--uswps),var(--pwr));display:flex;align-items:center;justify-content:center;font-weight:700;font-size:21px;color:#fff;margin:0 auto 20px;box-shadow:0 4px 20px rgba(232,133,79,.25)}
.login-box h1{font-size:26px;color:var(--txH);margin-bottom:5px;letter-spacing:-.03em}
.login-box .sub{font-size:14px;color:var(--tx3);margin-bottom:32px;line-height:1.5}
.google-btn{display:inline-flex;align-items:center;gap:10px;padding:14px 32px;border-radius:10px;background:#fff;color:#333;font-weight:600;font-size:16px;box-shadow:0 2px 10px rgba(0,0,0,.15);transition:all .15s}
.google-btn:hover{box-shadow:0 4px 16px rgba(0,0,0,.2);transform:translateY(-1px)}
.google-btn svg{width:22px;height:22px}
.login-error{color:var(--red);font-size:13px;margin-top:14px}

.hdr{background:var(--hdr-bg);border-bottom:1px solid var(--bdr);padding:16px 22px 12px;position:sticky;top:0;z-index:100;transition:background .3s}
.hdr-row{display:flex;align-items:center;gap:12px;margin-bottom:6px;flex-wrap:wrap}
.hdr .logo{width:38px;height:38px;border-radius:10px;background:linear-gradient(135deg,var(--uswps),var(--pwr));display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;color:#fff;flex-shrink:0}
.hdr h1{font-size:19px;font-weight:700;color:var(--txH);letter-spacing:-.03em}
.hdr .sub{font-size:12px;color:var(--tx3);margin-top:1px}
.sync-dot{display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:5px;vertical-align:middle;background:var(--green);box-shadow:0 0 6px rgba(84,212,138,.4)}
.user-pill{display:flex;align-items:center;gap:8px;padding:5px 12px 5px 5px;border-radius:20px;background:var(--bg2);border:1px solid var(--bdr)}
.user-pill img{width:28px;height:28px;border-radius:50%}
.user-pill span{font-size:12px;color:var(--tx2);font-weight:500;max-width:90px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.icon-btn{background:var(--bg2);border:1px solid var(--bdr);color:var(--tx3);font-size:16px;width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center}
.icon-btn:hover{border-color:var(--acc);color:var(--acc)}
.logout-btn{background:none;color:var(--tx4);font-size:12px;padding:4px 10px;border-radius:5px}.logout-btn:hover{color:var(--red)}
.tabs{display:flex;gap:4px;margin-top:10px}
.tab{flex:1;padding:10px 6px;border-radius:9px;background:transparent;color:var(--tx3);font-weight:600;font-size:13px;transition:all .2s}
.tab:hover{color:var(--tx2)}.tab.on{background:var(--tab-on);color:var(--acc)}

.content{padding:16px 22px 40px;max-height:calc(100vh - 136px);overflow-y:auto;scroll-behavior:smooth}
.content::-webkit-scrollbar{width:5px}.content::-webkit-scrollbar-thumb{background:var(--bdr2);border-radius:3px}

.filters{display:flex;gap:5px;margin-bottom:12px;flex-wrap:wrap}
.fbtn{padding:7px 14px;border-radius:7px;background:var(--bg2);color:var(--tx3);font-weight:600;font-size:13px;border:1px solid var(--bdr)}.fbtn:hover{color:var(--tx2);border-color:var(--bdr2)}.fbtn.on{background:var(--bdr2);color:var(--acc);border-color:var(--bdr2)}.fbtn.own.on{color:var(--txH)}
.sem-label{font-size:11px;font-weight:700;color:var(--tx4);text-transform:uppercase;letter-spacing:.12em;padding:16px 2px 7px}

.card{margin-bottom:6px;background:var(--bg2);border-radius:var(--radius);border:1px solid var(--bdr);overflow:hidden;transition:all .2s}
.card.open{background:var(--bg3);border-color:var(--bdr2)}
.card-hdr{padding:13px 16px;cursor:pointer;display:flex;align-items:center;gap:11px;user-select:none}
.card-bar{width:4px;height:30px;border-radius:2px;flex-shrink:0}
.card-title{font-weight:600;font-size:16px;color:var(--txH);letter-spacing:-.01em}
.card-meta{font-size:12px;color:var(--tx3);margin-top:2px}
.badge{display:inline-block;padding:2px 8px;border-radius:5px;font-size:10.5px;font-weight:700}
.chevron{color:var(--tx4);font-size:16px;transition:transform .25s}.card.open .chevron{transform:rotate(180deg)}
.card-body{padding:0 16px 16px}

.sec-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:7px;margin-top:8px}
.sec-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.1em}.sec-label.classic{color:var(--w)}.sec-label.ai{color:var(--acc)}
.abtn{padding:6px 14px;border-radius:6px;font-weight:600;font-size:12px}
.abtn.classic{background:var(--abtn-c);color:var(--w)}.abtn.ai{background:var(--abtn-a);color:var(--acc)}
.abtn.edit{background:var(--bg4);color:var(--tx2)}.abtn.del{background:none;color:var(--red);opacity:.6}.abtn.del:hover{opacity:1}
.add-row{display:flex;gap:6px;margin-bottom:8px}
.inp{padding:9px 12px;border:1px solid var(--bdr2);border-radius:7px;background:var(--bg);color:var(--inp-col);font-size:14px;transition:border-color .2s;width:100%;box-sizing:border-box}.inp:focus{border-color:var(--acc)}
select.inp{width:auto}
.topic{display:flex;align-items:flex-start;gap:8px;padding:6px 0;font-size:14.5px;line-height:1.55;border-bottom:1px solid var(--topic-bdr)}.topic:last-child{border-bottom:none}
.topic .dot{flex-shrink:0;margin-top:4px;font-size:11px}.topic .txt{flex:1}
.topic .rm{background:none;color:var(--tx4);font-size:16px;padding:0 2px;line-height:1;opacity:0;transition:all .15s}.topic:hover .rm{opacity:1}.topic .rm:hover{color:var(--red)}
.empty-msg{font-size:13.5px;color:var(--tx4);font-style:italic;padding:6px 0}
.note-area{margin-top:8px;padding:8px 10px;background:var(--note-bg);border:1px solid var(--bdr);border-radius:7px;font-size:13px;color:var(--tx2);resize:vertical;min-height:36px;width:100%;box-sizing:border-box;transition:border-color .2s}
.note-area:focus{border-color:var(--acc)}
.note-label{font-size:10px;color:var(--tx4);margin-top:10px;margin-bottom:3px}

.cat-header{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;padding:18px 0 9px;display:flex;align-items:center;gap:8px}
.cat-header::after{content:'';flex:1;height:1px;background:var(--bdr)}
.oc-card{padding:14px 16px;background:var(--bg2);border-radius:var(--radius);margin-bottom:5px;border:1px solid var(--bdr);transition:border-color .15s}.oc-card:hover{border-color:var(--bdr2)}
.oc-hdr{display:flex;gap:8px;align-items:flex-start}
.oc-code{font-family:'JetBrains Mono',monospace;font-weight:600;font-size:13px;flex-shrink:0;padding:2px 7px;border-radius:4px}
.oc-txt{flex:1;font-size:14.5px;color:var(--tx2);line-height:1.55}
.chips{margin-top:8px;display:flex;flex-wrap:wrap;gap:3px}
.chip{padding:3px 8px;border-radius:4px;font-size:10.5px;cursor:pointer;max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;transition:all .15s;font-weight:500}.chip:hover{filter:brightness(1.2)}

.log-row{padding:9px 14px;border-radius:7px;margin-bottom:3px;font-size:13px;display:flex;gap:10px}
.log-row:nth-child(odd){background:var(--bg2)}.log-row:nth-child(even){background:var(--bg3)}
.log-who{color:var(--acc);font-weight:600;flex-shrink:0;min-width:75px;font-size:12.5px}.log-what{flex:1;color:var(--tx2)}.log-when{color:var(--tx4);font-size:11px;flex-shrink:0;font-family:'JetBrains Mono',monospace}

.presence-bar{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px}
.presence-pill{display:flex;align-items:center;gap:6px;padding:4px 10px 4px 4px;border-radius:16px;background:var(--bg2);border:1px solid var(--bdr);font-size:12px;color:var(--tx2)}
.presence-pill img{width:22px;height:22px;border-radius:50%}
.presence-pill .online-dot{width:6px;height:6px;border-radius:50%;background:var(--green);flex-shrink:0}

.io-bar{display:flex;gap:6px;flex-wrap:wrap;margin-top:20px;padding-top:16px;border-top:1px solid var(--bdr)}
.io-btn{padding:9px 18px;border:1px solid var(--bdr2);border-radius:8px;background:var(--bg3);color:var(--tx2);font-weight:600;font-size:13px;transition:all .15s}
.io-btn:hover{border-color:var(--acc);color:var(--acc)}.io-btn.danger{border-color:var(--red);color:var(--red);opacity:.5}.io-btn.danger:hover{opacity:1}
.stats{margin-top:18px;padding:14px 18px;background:var(--bg2);border-radius:var(--radius);display:flex;gap:16px;flex-wrap:wrap;align-items:center;font-size:13px;color:var(--tx3);border:1px solid var(--bdr)}
.stats strong{color:var(--txH)}
.edit-row{display:flex;gap:6px;margin-bottom:6px;flex-wrap:wrap;align-items:center}
.hidden{display:none}
@media(max-width:500px){.content{padding:10px 14px}.hdr{padding:14px 16px 10px}html{font-size:15px}}
</style>
</head>

// ─── HELPERS ─────────────────────────────────────────────────────
function toArr(v){if(!v)return[];if(Array.isArray(v))return v;if(typeof v==="object")return Object.values(v);return[]}
function fixC(raw){return toArr(raw).map(c=>({...c,ct:toArr(c.ct),at:toArr(c.at),notes:c.notes||"",lecW:c.lecW||"",lecC:c.lecC||""}))}
function fixO(raw){return toArr(raw).map(o=>({...o,mp:toArr(o.mp),notes:o.notes||""}))}
function esc(s){return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;")}
function who(){return currentUser?.displayName?.split(" ")[0]||"Anonim"}

function toggleTheme(){const l=document.documentElement.classList.toggle("light");localStorage.setItem("cwb-theme",l?"light":"dark");document.querySelectorAll(".icon-btn").forEach(b=>{if(b.textContent.match(/[🌙☀️]/))b.textContent=l?"☀️":"🌙"})}
(function(){if(localStorage.getItem("cwb-theme")==="light"){document.documentElement.classList.add("light");setTimeout(()=>document.querySelectorAll(".icon-btn").forEach(b=>{if(b.textContent==="🌙")b.textContent="☀️"}),50)}})();

// ─── AUTH & DB ───────────────────────────────────────────────────
firebase.initializeApp(FIREBASE_CONFIG);
db=firebase.database();

function doLogin(){firebase.auth().signInWithPopup(new firebase.auth.GoogleAuthProvider()).catch(e=>{document.getElementById("loginError").textContent="Błąd: "+e.message})}
function doLogout(){if(presenceRef)presenceRef.remove();firebase.auth().signOut()}

firebase.auth().onAuthStateChanged(user=>{
  if(user){
    currentUser=user;
    document.getElementById("loginScreen").classList.add("hidden");
    document.getElementById("mainApp").classList.remove("hidden");
    document.getElementById("userPhoto").src=user.photoURL||"";
    document.getElementById("userDisplayName").textContent=user.displayName?.split(" ")[0]||user.email;
    // Presence
    presenceRef=db.ref("presence/"+user.uid);
    presenceRef.set({name:user.displayName||user.email,photo:user.photoURL||"",lastSeen:firebase.database.ServerValue.TIMESTAMP});
    presenceRef.onDisconnect().remove();
    db.ref("presence").on("value",snap=>{presenceUsers=snap.val()||{};render()});
    // Data
    db.ref("curriculum").on("value",snap=>{
      const d=snap.val();
      if(d){S.courses=fixC(d.courses);S.outcomes=fixO(d.outcomes);S.history=toArr(d.history);S.links=d.links||{}}
      render();
    });
    db.ref("curriculum").once("value",snap=>{if(!snap.val())db.ref("curriculum").set({courses:INIT_COURSES,outcomes:INIT_OUTCOMES,history:[]})});
  } else {
    currentUser=null;
    document.getElementById("loginScreen").classList.remove("hidden");
    document.getElementById("mainApp").classList.add("hidden");
  }
});

function save(){db.ref("curriculum").set({courses:S.courses,outcomes:S.outcomes,history:S.history,links:S.links||{}})}
function addH(w){S.history.unshift({who:who(),what:w,when:new Date().toLocaleString("pl-PL")});if(S.history.length>200)S.history.length=200}

// ─── RENDER ──────────────────────────────────────────────────────
function render(){
  const wt=S.courses.filter(c=>(c.ct||[]).length||(c.at||[]).length).length;
  document.getElementById("statusBar").innerHTML=`<span class="sync-dot"></span>Firebase · ${S.courses.length} przedm. · ${wt} z wątkami · ${S.outcomes.length} efektów`;
  const tabs=[["courses","📚 Przedmioty"],["outcomes","🎯 Efekty"],["matrix","📊 Matryca"],["links","🔗 Powiązania"],["users","👥 Użytkownicy"],["log","📝 Historia"]];
  document.getElementById("tabs").innerHTML=tabs.map(([id,l])=>`<button class="tab ${S.tab===id?"on":""}" onclick="S.tab='${id}';render()">${l}</button>`).join("");
  const el=document.getElementById("content");
  if(S.tab==="courses")el.innerHTML=rCourses();
  else if(S.tab==="outcomes")el.innerHTML=rOutcomes();
  else if(S.tab==="matrix")el.innerHTML=rMatrix();
  else if(S.tab==="links")el.innerHTML=rLinks();
  else if(S.tab==="users")el.innerHTML=rUsers();
  else el.innerHTML=rLog();
  // Auto-focus edit inputs
  if(S.editTopic){const ef=document.querySelector(`[id^="editT-"]`);if(ef){ef.focus();ef.selectionStart=ef.value.length}}
}

function rCourses(){
  const cs=S.courses.filter(c=>(S.fs===0||c.sem===S.fs)&&(S.fo==="all"||c.owner===S.fo));
  const sems=[...new Set(cs.map(c=>c.sem))].sort((a,b)=>a-b);
  let h=`<div class="filters"><button class="fbtn ${S.fs===0?"on":""}" onclick="S.fs=0;render()">Wszystkie</button>`;
  for(let s=1;s<=7;s++)h+=`<button class="fbtn ${S.fs===s?"on":""}" onclick="S.fs=${s};render()">S${s}</button>`;
  h+=`<div style="flex:1"></div>`;
  for(const o of["all","USWPS","PWr"])h+=`<button class="fbtn own ${S.fo===o?"on":""}" onclick="S.fo='${o}';render()">${o==="all"?"Obie":o}</button></div>`;
  for(const sem of sems){
    h+=`<div class="sem-label">${SL[sem]}</div>`;
    for(const c of cs.filter(x=>x.sem===sem)){
      const isO=S.openCourse===c.id,col=OC_MAP[c.owner]||"var(--other)",isEdit=S.editCourse===c.id;
      h+=`<div class="card ${isO?"open":""}"><div class="card-hdr" onclick="S.openCourse=S.openCourse==='${c.id}'?null:'${c.id}';render()"><div class="card-bar" style="background:${col}"></div><div style="flex:1"><div class="card-title">${esc(c.name)}</div><div class="card-meta"><span class="badge" style="background:${col}22;color:${col}">${c.owner}</span> ${c.h}h · ${(c.ct||[]).length} klas. · ${(c.at||[]).length} AI</div></div><span class="chevron">▾</span></div>`;
      if(isO){
        h+=`<div class="card-body">`;
        // Edit course button
        h+=`<div style="display:flex;gap:6px;margin-bottom:8px"><button class="abtn edit" onclick="event.stopPropagation();S.editCourse=S.editCourse==='${c.id}'?null:'${c.id}';render()">✏️ Edytuj przedmiot</button>`;
        h+=`<button class="abtn del" onclick="event.stopPropagation();delCourse('${c.id}')">🗑 Usuń</button></div>`;
        if(isEdit){
          h+=`<div class="edit-row"><input class="inp" style="flex:2;min-width:180px" value="${esc(c.name)}" onchange="updCourse('${c.id}','name',this.value)"><select class="inp" onchange="updCourse('${c.id}','sem',+this.value)">`;
          for(let s=1;s<=7;s++)h+=`<option value="${s}" ${c.sem===s?"selected":""}>Sem. ${s}</option>`;
          h+=`</select><select class="inp" onchange="updCourse('${c.id}','owner',this.value)"><option ${c.owner==="USWPS"?"selected":""}>USWPS</option><option ${c.owner==="PWr"?"selected":""}>PWr</option><option value="inne" ${c.owner==="inne"?"selected":""}>inne</option></select></div>`;
          h+=`<div class="edit-row"><label style="font-size:12px;color:var(--tx3)">Godziny:</label><input class="inp" type="number" style="width:70px" value="${c.h||0}" onchange="updCourse('${c.id}','h',+this.value)"></div>`;
          h+=`<div class="edit-row"><label style="font-size:12px;color:var(--tx3);min-width:60px">Wykład:</label><input class="inp" style="flex:1" placeholder="Prowadzący wykład…" value="${esc(c.lecW||'')}" onchange="updCourse('${c.id}','lecW',this.value)"></div>`;
          h+=`<div class="edit-row"><label style="font-size:12px;color:var(--tx3);min-width:60px">Ćwiczenia:</label><input class="inp" style="flex:1" placeholder="Prowadzący ćwiczenia…" value="${esc(c.lecC||'')}" onchange="updCourse('${c.id}','lecC',this.value)"></div>`;
        } else if(c.lecW||c.lecC){
          h+=`<div style="font-size:12px;color:var(--tx3);margin-bottom:6px;line-height:1.6">`;
          if(c.lecW)h+=`<div>👤 <strong>Wykład:</strong> ${esc(c.lecW)}</div>`;
          if(c.lecC)h+=`<div>👤 <strong>Ćwiczenia:</strong> ${esc(c.lecC)}</div>`;
          h+=`</div>`;
        }
        // Notes
        h+=`<div class="note-label">📝 Notatki do przedmiotu</div>`;
        h+=`<textarea class="note-area" placeholder="Dodaj notatkę…" onchange="updCourse('${c.id}','notes',this.value)">${esc(c.notes||"")}</textarea>`;
        // Topics
        h+=secB(c,"ct","classic","Wątki klasyczne","c");
        h+=`<div style="height:6px"></div>`;
        h+=secB(c,"at","ai","Wątki interdyscyplinarne AI","a");
        h+=`</div>`;
      }
      h+=`</div>`;
    }
  }
  const noT=S.courses.filter(c=>!(c.ct||[]).length&&!(c.at||[]).length).length;
  h+=`<div class="stats"><span>Z wątkami: <strong style="color:var(--green)">${S.courses.length-noT}</strong></span><span>Bez wątków: <strong style="color:var(--red)">${noT}</strong></span></div>`;
  h+=rIO();return h;
}

function secB(c,key,cls,label,tc){
  const arr=c[key]||[];
  let h=`<div class="sec-hdr"><span class="sec-label ${cls}">${label} (${arr.length})</span><button class="abtn ${cls}" onclick="toggleAdd('${c.id}','${tc}')">+ Dodaj</button></div>`;
  h+=`<div id="add-${tc}-${c.id}" style="display:none" class="add-row"><input class="inp" style="flex:1" id="inp-${tc}-${c.id}" placeholder="Nowy wątek…" onkeydown="if(event.key==='Enter')doAdd('${c.id}','${tc}','${key}')"><button class="abtn ${cls}" onclick="doAdd('${c.id}','${tc}','${key}')">OK</button></div>`;
  if(!arr.length)h+=`<div class="empty-msg">Brak wątków – kliknij + Dodaj</div>`;
  const ds=cls==="classic"?"color:var(--tx4)":"color:var(--ai-dot)",ts=cls==="classic"?"color:var(--tx2)":"color:var(--ai-txt)",dc=cls==="classic"?"•":"◆";
  const editKey=`${c.id}-${key}`;
  arr.forEach((t,i)=>{
    const isEditing=S.editTopic===editKey+"-"+i;
    if(isEditing){
      h+=`<div class="add-row" style="margin:2px 0"><input class="inp" style="flex:1" id="editT-${editKey}-${i}" value="${esc(t)}" onkeydown="if(event.key==='Enter')saveEditTopic('${c.id}','${key}',${i});if(event.key==='Escape'){S.editTopic=null;render()}"><button class="abtn ${cls}" onclick="saveEditTopic('${c.id}','${key}',${i})">✓</button><button class="abtn edit" onclick="S.editTopic=null;render()">✕</button></div>`;
    } else {
      h+=`<div class="topic"><span class="dot" style="${ds}">${dc}</span><span class="txt" style="${ts};cursor:pointer" onclick="S.editTopic='${editKey}-${i}';render()" title="Kliknij aby edytować">${esc(t)}</span><button class="rm" onclick="rmTopic('${c.id}','${key}',${i})">×</button></div>`;
    }
  });
  return h;
}

function rOutcomes(){
  let h='';const wt=S.courses.filter(c=>(c.ct||[]).length||(c.at||[]).length);
  for(const[cat,info]of Object.entries(CAT)){
    const items=S.outcomes.filter(o=>o.cat===cat);if(!items.length)continue;
    h+=`<div class="cat-header" style="color:${info.col}">${info.label} (${items.length})</div>`;
    items.forEach(o=>{
      const isEdit=S.editOc===o.id;
      h+=`<div class="oc-card">`;
      if(isEdit){
        h+=`<div class="edit-row"><input class="inp" style="width:70px" value="${esc(o.code)}" onchange="updOc('${o.id}','code',this.value)"><select class="inp" onchange="updOc('${o.id}','cat',this.value)"><option value="W" ${o.cat==="W"?"selected":""}>W</option><option value="U" ${o.cat==="U"?"selected":""}>U</option><option value="K" ${o.cat==="K"?"selected":""}>K</option></select><button class="abtn del" onclick="delOc('${o.id}')">🗑</button><button class="abtn edit" onclick="S.editOc=null;render()">✓ Gotowe</button></div>`;
        h+=`<textarea class="inp" style="margin-top:6px;min-height:60px;resize:vertical" onchange="updOc('${o.id}','text',this.value)">${esc(o.text)}</textarea>`;
      } else {
        h+=`<div class="oc-hdr"><span class="oc-code" style="color:${info.col};background:${info.col}15">${esc(o.code)}</span><span class="oc-txt">${esc(o.text)}</span><button class="abtn edit" style="flex-shrink:0;font-size:11px" onclick="S.editOc='${o.id}';render()">✏️</button></div>`;
      }
      // Notes
      h+=`<div class="note-label">📝 Notatka</div><textarea class="note-area" rows="1" placeholder="Notatka…" onchange="updOc('${o.id}','notes',this.value)">${esc(o.notes||"")}</textarea>`;
      // Mapping chips
      h+=`<div class="chips">`;
      wt.forEach(c=>{const m=(o.mp||[]).includes(c.id);const short=c.name.length>20?c.name.substring(0,18)+"…":c.name;
        h+=`<button class="chip" title="${esc(c.name)}" style="background:${m?info.col+"28":"var(--chip-off)"};color:${m?info.col:"var(--tx4)"};font-weight:${m?600:400}" onclick="togMap('${o.id}','${c.id}')">${esc(short)}</button>`});
      h+=`</div></div>`;
    });
  }
  h+=rIO();return h;
}

function rMatrix(){
  const cs=S.courses.sort((a,b)=>a.sem-b.sem);
  const catOrder=["W","U","K"];
  const ocs=S.outcomes.sort((a,b)=>{const ci=catOrder.indexOf(a.cat)-catOrder.indexOf(b.cat);return ci!==0?ci:a.code.localeCompare(b.code)});
  if(!ocs.length)return`<div style="text-align:center;padding:40px;color:var(--tx3)">Brak efektów uczenia. Dodaj je w zakładce 🎯 Efekty uczenia.</div>`;

  // Stats
  const unmapped=ocs.filter(o=>!(o.mp||[]).length);
  const totalMappings=ocs.reduce((s,o)=>(o.mp||[]).length+s,0);

  let h=`<div style="font-size:15px;font-weight:600;color:var(--txH);margin-bottom:6px">Matryca pokrycia efektów uczenia przez przedmioty</div>`;
  h+=`<div style="font-size:13px;color:var(--tx3);margin-bottom:14px">Kliknij komórkę, aby przypisać lub usunąć powiązanie. Kolory: <span style="color:var(--w)">■</span> Wiedza <span style="color:var(--u)">■</span> Umiejętności <span style="color:var(--k)">■</span> Kompetencje</div>`;

  // Summary cards
  h+=`<div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px">`;
  h+=`<div style="flex:1;min-width:120px;padding:12px 16px;background:var(--bg2);border:1px solid var(--bdr);border-radius:var(--radius)"><div style="font-size:11px;color:var(--tx3)">Łączne przypisania</div><div style="font-size:24px;font-weight:700;color:var(--txH)">${totalMappings}</div></div>`;
  h+=`<div style="flex:1;min-width:120px;padding:12px 16px;background:var(--bg2);border:1px solid var(--bdr);border-radius:var(--radius)"><div style="font-size:11px;color:var(--tx3)">Efekty bez przypisań</div><div style="font-size:24px;font-weight:700;color:${unmapped.length?'var(--red)':'var(--green)'}">${unmapped.length}</div></div>`;
  h+=`<div style="flex:1;min-width:120px;padding:12px 16px;background:var(--bg2);border:1px solid var(--bdr);border-radius:var(--radius)"><div style="font-size:11px;color:var(--tx3)">Śr. efektów / przedmiot</div><div style="font-size:24px;font-weight:700;color:var(--txH)">${cs.length?(totalMappings/cs.length).toFixed(1):"–"}</div></div>`;
  h+=`</div>`;

  // Per-course coverage bar chart
  h+=`<div style="font-size:13px;font-weight:600;color:var(--txH);margin-bottom:8px">Pokrycie efektów per przedmiot</div>`;
  cs.forEach(c=>{
    const cnt=ocs.filter(o=>(o.mp||[]).includes(c.id)).length;
    const pct=ocs.length?Math.round(cnt/ocs.length*100):0;
    const col=c.owner==="USWPS"?"var(--uswps)":c.owner==="PWr"?"var(--pwr)":"var(--other)";
    const short=c.name.length>30?c.name.substring(0,28)+"…":c.name;
    h+=`<div style="display:flex;align-items:center;gap:8px;margin-bottom:3px;font-size:12px">`;
    h+=`<div style="width:200px;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--tx2)" title="${esc(c.name)}"><span style="color:${col};font-weight:600">S${c.sem}</span> ${esc(short)}</div>`;
    h+=`<div style="flex:1;height:18px;background:var(--bg);border-radius:4px;overflow:hidden"><div style="height:100%;width:${pct}%;background:${col};border-radius:4px;transition:width .3s"></div></div>`;
    h+=`<div style="width:50px;text-align:right;color:${pct>30?'var(--txH)':'var(--tx4)'};font-weight:${pct>30?600:400};font-family:'JetBrains Mono',monospace;font-size:11px">${cnt}/${ocs.length}</div>`;
    h+=`</div>`;
  });

  // Matrix table
  h+=`<div style="font-size:13px;font-weight:600;color:var(--txH);margin:20px 0 8px">Szczegółowa matryca</div>`;
  h+=`<div style="overflow-x:auto;border:1px solid var(--bdr);border-radius:var(--radius)"><table style="border-collapse:collapse;font-size:11px;width:100%;min-width:${cs.length*32+80}px">`;
  // Header
  h+=`<thead><tr><th style="padding:6px 10px;text-align:left;color:var(--tx3);border-bottom:1px solid var(--bdr);position:sticky;left:0;background:var(--bg3);z-index:2;min-width:70px;font-size:11px">Efekt</th>`;
  cs.forEach(c=>{
    const col=c.owner==="USWPS"?"var(--uswps)":c.owner==="PWr"?"var(--pwr)":"var(--other)";
    const short=c.name.replace(/Psychologia /g,"P. ").replace(/sztucznej inteligencji/g,"AI").replace(/Wprowadzenie do /g,"Wpr. ");
    h+=`<th style="padding:4px 2px;text-align:center;border-bottom:1px solid var(--bdr);writing-mode:vertical-lr;transform:rotate(180deg);max-width:28px;font-size:9.5px;color:${col};font-weight:600;white-space:nowrap;height:120px" title="${esc(c.name)}">${esc(short.substring(0,22))}</th>`;
  });
  h+=`</tr></thead><tbody>`;

  // Rows by category
  let prevCat="";
  ocs.forEach(o=>{
    const catInfo=CAT[o.cat]||{col:"var(--tx)",label:""};
    if(o.cat!==prevCat){
      prevCat=o.cat;
      h+=`<tr><td colspan="${cs.length+1}" style="padding:6px 10px;font-size:10px;font-weight:700;color:${catInfo.col};text-transform:uppercase;letter-spacing:.1em;background:var(--bg);border-bottom:1px solid var(--bdr)">${catInfo.label}</td></tr>`;
    }
    h+=`<tr>`;
    h+=`<td style="padding:4px 10px;font-family:'JetBrains Mono',monospace;font-weight:600;color:${catInfo.col};border-bottom:1px solid var(--bdr);position:sticky;left:0;background:var(--bg3);z-index:1;font-size:11px" title="${esc(o.text)}">${esc(o.code)}</td>`;
    cs.forEach(c=>{
      const mapped=(o.mp||[]).includes(c.id);
      h+=`<td onclick="togMap('${o.id}','${c.id}')" style="padding:3px;text-align:center;border-bottom:1px solid var(--bdr);cursor:pointer">`;
      h+=`<div style="width:20px;height:20px;border-radius:4px;margin:0 auto;background:${mapped?catInfo.col:'var(--bg)'};opacity:${mapped?.85:.2};transition:all .15s;display:flex;align-items:center;justify-content:center;font-size:10px;color:var(--bg);font-weight:700">${mapped?"✓":""}</div>`;
      h+=`</td>`;
    });
    h+=`</tr>`;
  });
  h+=`</tbody></table></div>`;

  // Unmapped warnings
  if(unmapped.length){
    h+=`<div style="margin-top:16px;padding:14px 16px;background:var(--red)11;border:1px solid var(--red)33;border-radius:var(--radius)">`;
    h+=`<div style="font-size:13px;font-weight:700;color:var(--red);margin-bottom:6px">⚠ Efekty bez przypisania do żadnego przedmiotu (${unmapped.length})</div>`;
    unmapped.forEach(o=>{h+=`<div style="font-size:12px;color:var(--tx2);padding:2px 0"><strong style="color:${(CAT[o.cat]||{}).col||'var(--tx)'}">${esc(o.code)}</strong>: ${esc(o.text.substring(0,80))}…</div>`});
    h+=`</div>`;
  }
  return h;
}

function rUsers(){
  const users=Object.values(presenceUsers);
  let h=`<div style="font-size:15px;font-weight:600;color:var(--txH);margin-bottom:14px">👥 Aktualnie zalogowani (${users.length})</div>`;
  h+=`<div class="presence-bar">`;
  users.forEach(u=>{h+=`<div class="presence-pill"><img src="${esc(u.photo)}" alt=""><span class="online-dot"></span><span>${esc(u.name)}</span></div>`});
  h+=`</div>`;
  // Per-user history
  const byUser={};S.history.forEach(e=>{if(!byUser[e.who])byUser[e.who]=[];byUser[e.who].push(e)});
  h+=`<div style="font-size:15px;font-weight:600;color:var(--txH);margin:20px 0 10px">📊 Aktywność użytkowników</div>`;
  Object.entries(byUser).sort((a,b)=>b[1].length-a[1].length).forEach(([name,entries])=>{
    h+=`<div style="margin-bottom:12px;padding:12px 16px;background:var(--bg2);border:1px solid var(--bdr);border-radius:var(--radius)">`;
    h+=`<div style="font-weight:600;color:var(--acc);font-size:14px;margin-bottom:4px">${esc(name)} <span style="color:var(--tx3);font-weight:400;font-size:12px">· ${entries.length} zmian</span></div>`;
    entries.slice(0,5).forEach(e=>{h+=`<div style="font-size:12px;color:var(--tx2);padding:2px 0">${esc(e.what)} <span style="color:var(--tx4);font-size:10px">${esc(e.when)}</span></div>`});
    if(entries.length>5)h+=`<div style="font-size:11px;color:var(--tx4);margin-top:3px">…i ${entries.length-5} więcej</div>`;
    h+=`</div>`;
  });
  return h;
}

function rLog(){
  let h=`<div style="font-size:14px;color:var(--tx3);margin-bottom:10px">Pełna historia zmian (${S.history.length}) — synchronizowana w czasie rzeczywistym</div>`;
  if(!S.history.length)h+=`<div style="text-align:center;padding:30px;color:var(--tx4)">Brak zmian</div>`;
  S.history.forEach(e=>{h+=`<div class="log-row"><span class="log-who">${esc(e.who)}</span><span class="log-what">${esc(e.what)}</span><span class="log-when">${esc(e.when)}</span></div>`});
  h+=rIO();return h;
}

function rIO(){return`<div class="io-bar"><button class="io-btn" onclick="doExport()">📥 Eksportuj JSON</button><button class="io-btn" onclick="document.getElementById('impF').click()">📤 Importuj JSON</button><input type="file" id="impF" class="hidden" accept=".json" onchange="doImport(event)"><div style="flex:1"></div><button class="io-btn danger" onclick="doReset()">🗑 Reset</button></div>`}

// ─── ACTIONS ─────────────────────────────────────────────────────
function toggleAdd(cid,t){const el=document.getElementById(`add-${t}-${cid}`);if(el){el.style.display=el.style.display==="none"?"flex":"none";if(el.style.display==="flex")el.querySelector("input").focus()}}
function doAdd(cid,t,key){const inp=document.getElementById(`inp-${t}-${cid}`);if(!inp||!inp.value.trim())return;const c=S.courses.find(x=>x.id===cid);if(!c)return;if(!c[key])c[key]=[];c[key].push(inp.value.trim());addH(`+ ${key==="ct"?"klas.":"AI"} → „${c.name.substring(0,25)}…"`);save()}
function rmTopic(cid,key,idx){const c=S.courses.find(x=>x.id===cid);if(!c||!c[key])return;c[key].splice(idx,1);addH(`− wątek z „${c.name.substring(0,25)}…"`);save()}
function saveEditTopic(cid,key,idx){const inp=document.getElementById(`editT-${cid}-${key}-${idx}`);if(!inp)return;const c=S.courses.find(x=>x.id===cid);if(!c||!c[key])return;const old=c[key][idx];c[key][idx]=inp.value.trim();S.editTopic=null;if(old!==c[key][idx])addH(`✏️ Edycja wątku w „${c.name.substring(0,25)}…"`);save()}
function updCourse(cid,field,val){const c=S.courses.find(x=>x.id===cid);if(!c)return;c[field]=val;if(field!=="notes")addH(`Edycja ${field} → „${String(val).substring(0,30)}…"`);save()}
function delCourse(cid){const c=S.courses.find(x=>x.id===cid);if(!c||!confirm(`Usunąć „${c.name}"?`))return;S.courses=S.courses.filter(x=>x.id!==cid);S.openCourse=null;addH(`🗑 Usunięto „${c.name.substring(0,30)}"`);save()}
function updOc(oid,field,val){const o=S.outcomes.find(x=>x.id===oid);if(!o)return;o[field]=val;if(field!=="notes")addH(`Edycja efektu ${o.code}: ${field}`);save()}
function delOc(oid){const o=S.outcomes.find(x=>x.id===oid);if(!o||!confirm(`Usunąć efekt ${o.code}?`))return;S.outcomes=S.outcomes.filter(x=>x.id!==oid);addH(`🗑 Usunięto efekt ${o.code}`);save()}
function togMap(oid,cid){const o=S.outcomes.find(x=>x.id===oid);if(!o)return;if(!o.mp)o.mp=[];const i=o.mp.indexOf(cid);if(i>=0)o.mp.splice(i,1);else o.mp.push(cid);save()}
function doExport(){const d=JSON.stringify({courses:S.courses,outcomes:S.outcomes,history:S.history},null,2);const a=document.createElement("a");a.href=URL.createObjectURL(new Blob([d],{type:"application/json"}));a.download=`curriculum-${new Date().toISOString().slice(0,10)}.json`;a.click()}
function doImport(ev){const f=ev.target.files[0];if(!f)return;const r=new FileReader();r.onload=e=>{try{const d=JSON.parse(e.target.result);if(d.courses)S.courses=d.courses;if(d.outcomes)S.outcomes=d.outcomes;if(d.history)S.history=d.history;addH("Import z pliku");save();alert("Zaimportowano!")}catch(err){alert("Błąd: "+err.message)}};r.readAsText(f);ev.target.value=""}
function doReset(){if(!confirm("Przywrócić dane początkowe? Wszystkie zmiany zostaną utracone."))return;S.courses=JSON.parse(JSON.stringify(INIT_COURSES));S.outcomes=JSON.parse(JSON.stringify(INIT_OUTCOMES));addH("RESET");save()}
</script>
</body>
